    <style>
        /* Variabel CSS untuk kemudahan kustomisasi warna */
        :root {
            --primary-green: #37d396; /* Hijau utama Buzzpoin */
            --primary-green-dark: #2ab681;
            --bg-light: #f0f4f7; /* Latar belakang terang */
            --bg-dark-card: #ffffff; /* Warna card utama yang putih */
            --text-dark: #1a202c; /* Teks gelap untuk kontras */
            --text-secondary-dark: #4a5568;
            --border-light: #e2e8f0;

            /* Warna untuk elemen informasi */
            --info-box-bg: #ebf8ff;
            --info-box-border: #90cdf4;
            --rules-box-bg: #fff5f5;
            --rules-box-border: #feb2b2;
            --warning-box-bg: #fffaf0;
            --warning-box-border: #fbd38d;

            /* Warna WhatsApp */
            --whatsapp-green: #25d366;
            --whatsapp-green-hover: #1da851;

            /* Gradient untuk card utama (opsional, bisa diganti solid white) */
            --card-gradient-start: #f8fcfd;
            --card-gradient-end: #ffffff;

            /* Warna untuk Live Activity */
            --activity-bg: #e6fffa;
            --activity-text: #2d3748;
            --activity-icon: #38b2ac;

            /* Warna untuk Navigasi Header - Defaultnya teks gelap */
            --nav-link-text-inactive: #4a5568; 
        }

        /* Keyframes untuk animasi */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideInFromLeft {
            from { opacity: 0; transform: translateX(-50px); }
            to { opacity: 1; transform: translateX(0); }
        }

        @keyframes slideInFromRight {
            from { opacity: 0; transform: translateX(50px); }
            to { opacity: 1; transform: translateX(0); }
        }

        @keyframes popInScale {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        @keyframes pulseLight {
            0% { box-shadow: 0 0 0 0 rgba(55, 211, 150, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(55, 211, 150, 0); }
            100% { box-shadow: 0 0 0 0 rgba(55, 211, 150, 0); }
        }

        @keyframes shakeInput {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
            20%, 40%, 60%, 80% { transform: translateX(5px); }
        }

        @keyframes newActivity {
            0% { opacity: 0; transform: translateY(10px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        /* Styling dasar untuk body */
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-light);
            color: var(--text-dark);
            display: flex;
            flex-direction: column; /* Mengatur item secara kolom */
            justify-content: flex-start; /* Konten dimulai dari atas */
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            line-height: 1.6;
            overflow-x: hidden;
            font-size: 16px;
            position: relative; /* Untuk gradasi di background */
            z-index: 1;
        }

        /* Gradasi di background seperti Buzzpoin */
        body::before {
            content: '';
            position: fixed; /* Agar tetap di tempat saat scroll */
            top: -10%;
            left: -10%;
            width: 120%;
            height: 120%;
            background: radial-gradient(circle at top left, rgba(55, 211, 150, 0.08), transparent 50%),
                        radial-gradient(circle at bottom right, rgba(55, 211, 150, 0.08), transparent 50%);
            opacity: 0.5;
            z-index: -1;
        }

        /* Header (inspirasi dari navigasi Buzzpoin) */
       .header {
            width: 100%;
            max-width: 600px;
            display: flex;
            flex-direction: column; /* Logo dan navigasi di bawahnya */
            align-items: center; /* Pusat horizontal */
            padding: 15px 0;
            margin-bottom: 30px;
            animation: fadeIn 0.8s ease-out forwards;
            animation-delay: 0.1s;
        }
       .header .logo { /* Logo utama */
            display: flex;
            align-items: center;
            font-weight: 700;
            font-size: 1.5em;
            color: var(--text-dark);
            margin-bottom: 20px; /* Jarak antara logo dan navigasi */
        }
       .header .logo i {
            color: var(--primary-green);
            margin-right: 8px;
            font-size: 1.2em;
        }
       .header .nav-links { /* Navigasi */
            display: flex; 
            justify-content: center; /* Pusat horizontal */
            gap: 20px; /* Jarak antar tombol, lebih besar sesuai gambar */
        }
       .header .nav-links a {
            text-decoration: none;
            background-color: transparent; /* DEFAULT: Transparan */
            color: var(--nav-link-text-inactive); /* DEFAULT: Warna teks gelap */
            font-weight: 600; 
            padding: 10px 18px; 
            border-radius: 8px; 
            transition: all 0.3s ease;
            white-space: nowrap; 
        }
       .header .nav-links a:hover {
            /* Untuk tombol non-aktif, hover hanya mengubah warna teks atau sedikit background */
            color: var(--primary-green);
            /* background-color: rgba(55, 211, 150, 0.1); ini bisa ditambahkan jika mau sedikit highlight */
        }
       .header .nav-links a.active { /* Tombol aktif */
            background-color: var(--primary-green);
            color: white;
            box-shadow: 0 4px 10px rgba(55, 211, 150, 0.3);
        }
       .header .nav-links a.active:hover {
             background-color: var(--primary-green-dark);
             box-shadow: 0 6px 15px rgba(55, 211, 150, 0.4);
        }

        /* Kontainer utama website (form card) */
       .container {
            background: linear-gradient(135deg, var(--card-gradient-start), var(--card-gradient-end));
            padding: 40px;
            border-radius: 16px; /* Lebih rounded */
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15); /* Shadow lebih menonjol */
            width: 100%;
            max-width: 600px;
            box-sizing: border-box;
            border: 1px solid var(--border-light);
            position: relative;
            overflow: hidden;
            animation: popInScale 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; /* Pop-in yang lebih dinamis */
            animation-delay: 0.2s;
            transition: all 0.3s ease;
            margin-bottom: 30px; /* Jarak ke Live Activity */
        }
