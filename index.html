<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SETOR GMAIL FINAL</title>

<style>
body{
margin:0;
font-family:sans-serif;
background:#020617;
color:white;
overflow:hidden;
}

canvas{position:fixed;}

.box{
max-width:400px;
margin:40px auto;
padding:25px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(20px);
border-radius:20px;
box-shadow:0 0 60px #000;
z-index:2;
position:relative;
}

input,textarea{
width:100%;
padding:12px;
margin:8px 0;
border-radius:10px;
border:1px solid #333;
background:#00000055;
color:white;
}

button{
width:100%;
padding:13px;
border:none;
border-radius:12px;
background:#6366f1;
color:white;
font-weight:bold;
cursor:pointer;
}

#total{text-align:center;color:#22c55e;}
#status{text-align:center;margin-top:10px;}

.admin{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#020617;
display:flex;
justify-content:center;
align-items:center;
z-index:999;
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="admin" id="adminLogin">
<div>
<h3>Admin Login</h3>
<input type="password" id="pass">
<button onclick="login()">Masuk</button>
</div>
</div>

<div class="box">
<h2>SETOR GMAIL</h2>

<form id="form">

<textarea id="akun" rows="10" placeholder="email1:pass&#10;email2:pass" required></textarea>

<input type="number" id="jumlah">
<div id="total"></div>

<input type="text" id="wa" placeholder="No WA" required>
<input type="text" id="dana" placeholder="No DANA" required>

<button>KIRIM</button>
<p id="status"></p>

</form>
</div>

<script>

/* ===== CONFIG ===== */
const TOKEN = "8657907532";
const CHAT_ID = "5943311408";
const ADMIN_PASS = "010107";
/* ================== */

let lastSubmit=0;

/* LOGIN */
function login(){
if(pass.value==ADMIN_PASS){
adminLogin.style.display="none";
}else{
alert("Salah password!");
}
}

/* HITUNG */
akun.oninput=()=>{
let list=akun.value.split("\n").filter(x=>x.trim());
jumlah.value=list.length;
total.innerText="Total: Rp "+(list.length*1500);
};

/* PARTICLE */
const canvas=document.getElementById("bg");
const ctx=canvas.getContext("2d");
canvas.width=innerWidth;
canvas.height=innerHeight;

let p=[];
for(let i=0;i<60;i++){
p.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height});
}

function draw(){
ctx.clearRect(0,0,canvas.width,canvas.height);
p.forEach(a=>{
a.y+=0.3;
if(a.y>canvas.height)a.y=0;
ctx.fillStyle="#6366f1";
ctx.fillRect(a.x,a.y,2,2);
});
requestAnimationFrame(draw);
}
draw();

/* SUBMIT */
form.addEventListener("submit",async(e)=>{
e.preventDefault();

/* ANTI SPAM */
if(Date.now()-lastSubmit<5000){
status.innerText="Tunggu 5 detik!";
return;
}
lastSubmit=Date.now();

status.innerText="Mengirim...";

/* FILTER */
let list=akun.value.split("\n").filter(x=>x.includes("@"));

if(list.length==0){
status.innerText="Format salah!";
return;
}

/* ID TRANSAKSI */
let id="TRX"+Date.now();

/* PESAN */
const text=`📥 SETOR MASUK

🆔 ID: ${id}

📧 AKUN:
${list.join("\n")}

📊 JUMLAH: ${list.length}
💰 TOTAL: Rp ${list.length*1500}

📱 WA: ${wa.value}
💳 DANA: ${dana.value}

⏰ ${new Date().toLocaleString()}`;

/* TOMBOL TELEGRAM */
const keyboard={
inline_keyboard:[
[
{text:"✅ Approve",callback_data:id+"_ok"},
{text:"❌ Reject",callback_data:id+"_no"}
],
[
{text:"💰 Done",callback_data:id+"_done"}
]
]
};

try{

await fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage`,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
chat_id:CHAT_ID,
text:text,
reply_markup:keyboard
})
});

/* AUTO WA */
setTimeout(()=>{
window.open(`https://wa.me/${wa.value}?text=Setoran kamu sedang diproses`);
},1000);

status.innerText="BERHASIL!";
form.reset();
total.innerText="";

}catch{
status.innerText="GAGAL!";
}

});

/* POPUP */
setInterval(()=>{
let x=document.createElement("div");
x.style.position="fixed";
x.style.bottom="20px";
x.style.right="20px";
x.style.background="#ffffff11";
x.style.padding="10px";
x.innerText="User baru setor";
document.body.appendChild(x);
setTimeout(()=>x.remove(),2000);
},4000);

</script>
</body>
</html>
