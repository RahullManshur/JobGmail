<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Setor Akun Gmail - Job Gmail</title>
    <!-- Font Awesome untuk ikon, dimuat dari CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* Variabel CSS untuk kemudahan kustomisasi warna */
        :root {
            --dark-bg-start: #1c273a;
            --dark-bg-end: #141d2d;
            --dark-card: #2d3748;
            --text-color: #e2e8f0;
            --input-bg: #4a5568;
            --input-border: #6b7280;
            --button-primary: #3490dc;
            --button-primary-hover: #2b6cb0;
            --button-success: #38a169;
            --button-warning: #ecc94b;
            --info-box-bg: #2d3748;
            --info-box-border: #4299e1;
            --rules-border: #667eea;
            --whatsapp-green: #25d366;
            --whatsapp-green-hover: #1da851;
        }

        /* Keyframes untuk animasi */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes popIn {
            from { transform: scale(0.95); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        @keyframes bounceIcon {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-5px); }
            60% { transform: translateY(-2px); }
        }

        /* Styling dasar untuk body */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--dark-bg-start), var(--dark-bg-end));
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: flex-start; /* Konten dimulai dari atas */
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            line-height: 1.6;
            overflow-x: hidden; /* Mencegah scroll horizontal dari animasi */
        }

        /* Kontainer utama website */
        .container {
            background-color: var(--dark-card);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 500px;
            box-sizing: border-box;
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
            overflow: hidden;
            /* Animasi Fade-in untuk container utama */
            animation: fadeIn 0.8s ease-out forwards;
        }

        /* Efek cahaya pada hover container */
        .container::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at center, rgba(255, 255, 255, 0.05) 0%, transparent 70%);
            transform: rotate(45deg);
            opacity: 0;
            transition: opacity 0.5s ease-in-out;
            pointer-events: none;
        }

        .container:hover::before {
            opacity: 1;
        }

        /* Judul utama */
        h1 {
            text-align: center;
            color: var(--text-color);
            margin-bottom: 5px;
            font-size: 2.2em;
            letter-spacing: 0.08em;
            text-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
        }

        /* Username di bawah judul */
        .username {
            display: block;
            text-align: center;
            color: #a0aec0;
            font-size: 0.85em;
            margin-bottom: 25px;
            font-style: italic;
            opacity: 0.8;
        }

        /* Styling dasar untuk semua box informasi (rules, info, warning) */
        .rules-box, .info-box, .warning-box {
            background-color: var(--info-box-bg);
            padding: 15px;
            border-radius: 8px;
            color: var(--text-color);
            font-size: 0.9em;
            margin-bottom: 25px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            opacity: 0; /* Mulai tersembunyi untuk animasi */
            animation: popIn 0.5s ease-out forwards;
        }

        /* Styling spesifik untuk box RULES */
        .rules-box {
            border-left: 6px solid var(--rules-border);
            animation-delay: 0.2s; /* Muncul sedikit lebih lambat */
        }
